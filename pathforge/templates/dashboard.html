<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - PathForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100">
  <header class="flex items-center justify-between border-b border-zinc-800 px-4 py-3">
    <a class="text-xl font-bold" href="/">PathForge</a>
    <nav class="flex gap-3 text-sm"><a href="/practice" class="text-cyan-300">Practice</a><button id="logout" class="text-zinc-400">Logout</button></nav>
  </header>
  <main class="mx-auto max-w-6xl space-y-5 p-4">
    <p id="error" class="min-h-6 text-sm text-red-300"></p>

    <section class="grid gap-4 lg:grid-cols-[1.2fr_0.8fr]">
      <div class="rounded-lg border border-zinc-800 bg-zinc-900 p-5 overflow-x-auto">
        <h2 class="font-semibold">Recent submissions</h2>
        <table class="mt-4 w-full text-left text-sm">
          <thead class="text-zinc-400"><tr><th class="py-2">Problem</th><th>Verdict</th><th>When</th></tr></thead>
          <tbody id="recent" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
      <div class="space-y-4">
        <div class="rounded-lg border border-zinc-800 bg-zinc-900 p-5">
          <h2 class="font-semibold">Needs Practice</h2>
          <div id="weakest" class="mt-4 space-y-3"></div>
          <div id="unexplored" class="mt-4 space-y-3 hidden">
            <p class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Unexplored</p>
            <div id="unexploredList" class="space-y-3"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="rounded-lg border border-zinc-800 bg-zinc-900 p-5">
      <h1 class="text-xl font-semibold">Topic Elo</h1>
      <p id="chartEmpty" class="text-sm text-zinc-400 py-8 text-center hidden">Practice a few problems to see your topic Elo chart.</p>
      <canvas id="eloChart" class="mt-4 max-h-80"></canvas>
    </section>

    <section class="grid gap-4 sm:grid-cols-4">
      <div class="stat"><p class="label">Overall Elo</p><p id="overall" class="stat-num">800</p></div>
      <div class="stat"><p class="label">Solved</p><p id="solved" class="stat-num">0</p></div>
      <div class="stat"><p class="label">Submissions</p><p id="subs" class="stat-num">0</p></div>
      <div class="stat"><p class="label">Streak</p><p id="streak" class="stat-num">0</p></div>
    </section>
    <section class="grid gap-4 sm:grid-cols-3">
      <div class="stat"><p class="label">Easy pass rate</p><p id="easyRate" class="stat-num">0%</p></div>
      <div class="stat"><p class="label">Medium pass rate</p><p id="mediumRate" class="stat-num">0%</p></div>
      <div class="stat"><p class="label">Hard pass rate</p><p id="hardRate" class="stat-num">0%</p></div>
    </section>
  </main>
  <script>
    const token = localStorage.getItem('pf_token'), userId = localStorage.getItem('pf_user_id');
    if (!token || !userId) location.href = '/';
    const showError = msg => error.textContent = msg || '';
    async function api(path) {
      const res = await fetch(path, {headers:{Authorization:`Bearer ${token}`}});
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Request failed');
      return json.data;
    }
    const HUMAN_NAMES = {
      "hash_map_lookup": "Hash Map Lookup",
      "hash_map_frequency": "Hash Map Frequency",
      "prefix_sum": "Prefix Sum",
      "sliding_window_fixed": "Fixed Sliding Window",
      "sliding_window_variable": "Sliding Window",
      "two_pointers_opposite": "Two Pointers",
      "two_pointers_same": "Two Pointers (Same Direction)",
      "dfs_recursive": "Depth-First Search",
      "dfs_iterative": "Depth-First Search (Iterative)",
      "bfs_level_order": "Breadth-First Search",
      "bfs_shortest_path": "Breadth-First Search (Shortest Path)",
      "topological_sort": "Topological Sort",
      "union_find": "Union-Find",
      "binary_search_tree": "Binary Search Tree",
      "dp_1d_forward": "1D Dynamic Programming",
      "dp_1d_sequence": "1D Sequence DP",
      "dp_2d_grid": "2D Grid DP",
      "dp_2d_string": "2D String DP",
      "dp_knapsack": "Knapsack DP",
      "dp_interval": "Interval DP",
      "dp_state_machine": "State Machine DP",
      "fast_slow_pointers": "Fast & Slow Pointers",
      "linked_list_reversal": "Linked List Reversal",
      "monotonic_stack": "Monotonic Stack",
      "monotonic_deque": "Monotonic Deque",
      "binary_search_standard": "Binary Search",
      "binary_search_rotated": "Binary Search (Rotated)",
      "binary_search_answer": "Binary Search on Answer",
      "heap_top_k": "Heap / Top K",
      "greedy_local": "Greedy",
      "greedy_interval": "Greedy (Intervals)",
      "backtracking_permutation": "Backtracking (Permutations)",
      "backtracking_subset": "Backtracking (Subsets)",
    };
    const human = p => HUMAN_NAMES[p] || p.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    function renderChart(profiles) {
      const practiced = profiles.filter(p => p.attempt_count > 0);
      const canvas = document.getElementById('eloChart');
      const empty = document.getElementById('chartEmpty');
      if (practiced.length === 0) {
        canvas.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      canvas.classList.remove('hidden');
      empty.classList.add('hidden');
      new Chart(canvas, {
        type: 'bar',
        data: {labels: practiced.map(p=>human(p.topic)), datasets:[{label:'Elo', data:practiced.map(p=>p.elo_rating), backgroundColor:practiced.map(p => p.elo_rating < 900 ? '#f97316' : p.elo_rating < 1000 ? '#facc15' : '#22d3ee')}]},
        options: {responsive:true, plugins:{legend:{labels:{color:'#e4e4e7'}}}, scales:{x:{ticks:{color:'#a1a1aa'}}, y:{ticks:{color:'#a1a1aa'}, suggestedMin:400, suggestedMax:1600}}}
      });
    }
    const pct = value => `${Math.round((value || 0) * 100)}%`;
    const weakClass = elo => elo < 900 ? 'border-orange-500/60 bg-orange-950/30' : elo < 1000 ? 'border-amber-400/60 bg-amber-950/30' : 'border-zinc-800';
    function topicCard(t) {
      return `<div class="rounded border p-3 ${weakClass(t.elo_rating)}"><p class="font-medium">${human(t.topic)}</p><p class="text-sm text-zinc-400">Elo ${Math.round(t.elo_rating)} - accuracy ${Math.round(t.accuracy*100)}% - recent failures ${t.recent_failures}</p></div>`;
    }
    function render(data) {
      overall.textContent = data.overall_elo;
      solved.textContent = data.stats.total_solved;
      subs.textContent = data.stats.total_submissions;
      streak.textContent = data.stats.current_streak;
      easyRate.textContent = pct(data.stats.pass_rate_by_difficulty.Easy);
      mediumRate.textContent = pct(data.stats.pass_rate_by_difficulty.Medium);
      hardRate.textContent = pct(data.stats.pass_rate_by_difficulty.Hard);
      const attempted = data.weakest_topics.filter(t => t.attempt_count > 0);
      const unexplored = data.weakest_topics.filter(t => t.attempt_count === 0);
      weakest.innerHTML = attempted.map(t => topicCard(t)).join('') || '<p class="text-sm text-zinc-400">No weak topics with attempts yet.</p>';
      if (unexplored.length > 0) {
        document.getElementById('unexplored').classList.remove('hidden');
        document.getElementById('unexploredList').innerHTML = unexplored.map(t => topicCard(t)).join('');
      } else {
        document.getElementById('unexplored').classList.add('hidden');
      }
      recent.innerHTML = data.recent_submissions.map(s => `<tr><td class="py-2">${s.title}</td><td>${s.verdict}</td><td>${s.submitted_at}</td></tr>`).join('') || '<tr><td class="py-3 text-zinc-400" colspan="3">No submissions yet.</td></tr>';
      renderChart(data.profiles);
    }
    logout.addEventListener('click', () => { localStorage.clear(); location.href = '/'; });
    api(`/api/profile/${userId}`).then(render).catch(err => showError(err.message));
  </script>
</body>
</html>
