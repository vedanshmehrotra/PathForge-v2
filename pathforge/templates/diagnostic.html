<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diagnostic - PathForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-zinc-950 text-zinc-100">
  <header class="flex items-center justify-between border-b border-zinc-800 px-4 py-3">
    <a class="text-xl font-bold" href="/">PathForge</a>
    <button id="logout" class="text-sm text-zinc-400">Logout</button>
  </header>
  <main class="grid min-h-[calc(100vh-57px)] gap-4 p-4 lg:grid-cols-[0.85fr_1.15fr]">
    <section class="rounded-lg border border-zinc-800 bg-zinc-900 p-5">
      <p class="text-sm font-semibold text-cyan-300">Onboarding diagnostic</p>
      <h1 id="title" class="mt-2 text-2xl font-semibold">Loading...</h1>
      <p id="meta" class="mt-3 text-sm text-zinc-400"></p>
      <a id="problemLink" class="mt-5 inline-block rounded-lg bg-cyan-700 px-4 py-2 font-semibold text-white"
        target="_blank">Open problem</a>
      <p id="message" class="mt-4 min-h-6 text-sm text-red-300"></p>
    </section>
    <section class="flex flex-col rounded-lg border border-zinc-800 bg-zinc-900">
      <textarea id="code"
        class="min-h-[440px] flex-1 resize-none bg-zinc-950 p-4 font-mono text-sm text-zinc-100 outline-none"
        spellcheck="false">def solve():
    pass
</textarea>
      <div class="flex flex-wrap gap-3 border-t border-zinc-800 p-3">
        <button id="passed" class="btn w-auto px-5">I Passed</button>
        <button id="failed" class="btn w-auto bg-zinc-700 px-5">I Failed</button>
      </div>
    </section>
  </main>
  <script>
    const token = localStorage.getItem('pf_token'), userId = localStorage.getItem('pf_user_id');
    if (!token || !userId) location.href = '/';
    const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    let currentProblem = null;
    async function api(path, options = {}) {
      const res = await fetch(path, { ...options, headers: { ...headers, ...(options.headers || {}) } });
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Request failed');
      return json.data;
    }
    async function loadDiagnostic() {
      message.textContent = '';
      const data = await api('/api/auth/onboarding/diagnostic');
      if (data.complete) { location.href = '/practice'; return; }
      currentProblem = data.problem;
      title.textContent = currentProblem.title;
      meta.textContent = `${data.total - data.remaining + 1} of ${data.total} ? ${currentProblem.difficulty} ? ${currentProblem.target_pattern.replaceAll('_', ' ')}`;
      problemLink.href = currentProblem.link || '#';
    }
    async function submit(verdict) {
      try {
        await api('/api/submit', {
          method: 'POST', body: JSON.stringify({
            user_id: Number(userId), problem_id: currentProblem.id, source_code: code.value,
            language: 'python', verdict, target_pattern: currentProblem.target_pattern
          })
        });
        code.value = 'def solve():\n    pass\n';
        await loadDiagnostic();
      } catch (err) { message.textContent = err.message; }
    }
    passed.addEventListener('click', () => submit('pass'));
    failed.addEventListener('click', () => submit('fail'));
    logout.addEventListener('click', () => { localStorage.clear(); location.href = '/'; });
    loadDiagnostic().catch(err => message.textContent = err.message);
  </script>
</body>

</html>
