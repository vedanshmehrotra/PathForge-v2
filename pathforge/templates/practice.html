<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Practice - PathForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100">
  <header class="flex items-center justify-between border-b border-zinc-800 px-4 py-3">
    <a class="text-xl font-bold" href="/">PathForge</a>
    <nav class="flex gap-3 text-sm"><a href="/dashboard" class="text-cyan-300">Dashboard</a><button id="logout" class="text-zinc-400">Logout</button></nav>
  </header>
  <main class="grid min-h-[calc(100vh-57px)] gap-4 p-4 lg:grid-cols-[0.85fr_1.15fr]">
    <section class="rounded-lg border border-zinc-800 bg-zinc-900 p-5">
      <p class="text-sm font-semibold text-cyan-300">Recommended practice</p>
      <h1 id="patternTitle" class="mt-2 text-2xl font-semibold">Loading...</h1>
      <div class="mt-4 flex flex-wrap gap-2">
        <span id="difficulty" class="badge"></span>
        <span id="tier" class="badge"></span>
      </div>
      <p id="explainRec" class="mt-5 text-sm text-zinc-300"></p>
      <a id="leetcodeLink" class="mt-5 inline-block rounded-lg bg-cyan-700 px-4 py-2 font-semibold text-white" target="_blank">Open LeetCode list</a>
      <div class="mt-6 rounded-lg bg-zinc-950 p-4 text-sm text-zinc-400">
        Pick any problem from the linked LeetCode list. After LeetCode tells you whether it passed, paste your Python solution here and report the verdict honestly.
      </div>
      <p id="error" class="mt-4 min-h-6 text-sm text-red-300"></p>
    </section>
    <section class="flex flex-col rounded-lg border border-zinc-800 bg-zinc-900">
      <div class="grid gap-3 border-b border-zinc-800 p-3 sm:grid-cols-[1fr_160px]">
        <select id="targetPattern" class="field"></select>
        <select id="language" class="field"><option value="python">Python</option></select>
      </div>
      <textarea id="code" class="min-h-[440px] flex-1 resize-none bg-zinc-950 p-4 font-mono text-sm text-zinc-100 outline-none" spellcheck="false">def solve():
    pass
</textarea>
      <div class="flex flex-wrap gap-3 border-t border-zinc-800 p-3">
        <button id="passed" class="btn w-auto px-5">I Passed on LeetCode</button>
        <button id="failed" class="btn w-auto bg-zinc-700 px-5">I Failed on LeetCode</button>
      </div>
      <div id="result" class="result-panel border-t border-zinc-800 p-4">
        <div class="grid gap-3 sm:grid-cols-4">
          <div><p class="label">Verdict</p><p id="verdict" class="font-semibold"></p></div>
          <div><p class="label">Target</p><p id="targetOut"></p></div>
          <div><p class="label">Detected</p><p id="detected"></p></div>
          <div><p class="label">Gap</p><p id="gap"></p></div>
        </div>
        <p id="feedback" class="mt-4 text-sm text-zinc-300"></p>
      </div>
    </section>
  </main>
  <script>
    const token = localStorage.getItem('pf_token'), userId = localStorage.getItem('pf_user_id');
    if (!token || !userId) location.href = '/';
    let currentRec = null;
    const authHeaders = {'Authorization': `Bearer ${token}`, 'Content-Type':'application/json'};
    const showError = msg => document.getElementById('error').textContent = msg || '';
    async function api(path, options={}) {
      const res = await fetch(path, {...options, headers:{...authHeaders, ...(options.headers||{})}});
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Request failed');
      return json.data;
    }
    function setRecommendation(rec) {
      currentRec = rec;
      patternTitle.textContent = rec.pattern.replaceAll('_', ' ');
      difficulty.textContent = rec.difficulty;
      tier.textContent = rec.tier;
      explainRec.textContent = rec.explanation;
      leetcodeLink.href = rec.leetcode_url;
      targetPattern.innerHTML = rec.patterns.map(p => `<option value="${p.pattern}">${p.label}</option>`).join('');
      targetPattern.value = rec.pattern;
    }
    async function submit(verdictValue) {
      showError('');
      try {
        const data = await api('/api/submit', {method:'POST', body:JSON.stringify({
          user_id:Number(userId),
          source_code:code.value,
          language:language.value,
          verdict:verdictValue,
          target_pattern:targetPattern.value
        })});
        verdict.textContent = data.submission.verdict;
        targetOut.textContent = targetPattern.value.replaceAll('_', ' ');
        detected.textContent = (data.submission.detected_pattern || 'none').replaceAll('_', ' ');
        const targetLabel = targetPattern.value.replaceAll('_', ' ');
        const detectedLabel = (data.submission.detected_pattern || 'none').replaceAll('_', ' ');
        gap.textContent = data.gap_info.gap_detected ? 'yes' : 'no';
        feedback.textContent = data.gap_info.gap_detected && data.submission.verdict === 'pass'
          ? `Looks like you used ${detectedLabel} instead of ${targetLabel}. We've updated your ${detectedLabel} profile.`
          : data.explanation;
        result.classList.add('show');
        if (data.recommendation.leetcode_url) setRecommendation({...currentRec, ...data.recommendation, patterns: currentRec.patterns});
      } catch (err) { showError(err.message); }
    }
    passed.addEventListener('click', () => submit('pass'));
    failed.addEventListener('click', () => submit('fail'));
    logout.addEventListener('click', () => { localStorage.clear(); location.href = '/'; });
    api('/api/auth/onboarding/diagnostic')
      .then(data => {
        if (!data.complete) { location.href = '/diagnostic'; return; }
        return api(`/api/recommend/${userId}`).then(setRecommendation);
      })
      .catch(err => showError(err.message));
  </script>
</body>
</html>
