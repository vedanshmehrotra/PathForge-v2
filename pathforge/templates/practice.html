<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Practice - PathForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100">
  <header class="flex items-center justify-between border-b border-zinc-800 px-4 py-3">
    <a class="text-xl font-bold" href="/">PathForge</a>
    <nav class="flex gap-3 text-sm"><a href="/dashboard" class="text-cyan-300">Dashboard</a><button id="logout" class="text-zinc-400">Logout</button></nav>
  </header>
  <main class="mx-auto max-w-4xl p-4 pt-8">
    <div id="loading" class="text-center text-zinc-400 py-20">Loading your recommendation...</div>
    <div id="practiceContent" class="hidden">
      <div class="rounded-lg border border-zinc-800 bg-zinc-900 p-6">
        <p class="text-xs font-semibold uppercase tracking-wider text-cyan-300">Recommended practice</p>
        <h1 id="problemTitle" class="mt-2 text-2xl font-semibold"></h1>
        <div class="mt-3 flex flex-wrap items-center gap-2">
          <span id="difficulty" class="badge"></span>
          <span id="reasonBadge" class="inline-block rounded-full border border-zinc-700 px-3 py-0.5 text-xs text-zinc-300"></span>
          <span id="topicTags" class="text-sm text-zinc-400"></span>
        </div>
        <details class="mt-4 group">
          <summary class="cursor-pointer text-xs font-semibold uppercase tracking-wider text-zinc-500 hover:text-zinc-300">Why this problem?</summary>
          <p id="explanation" class="mt-2 text-sm text-zinc-300"></p>
        </details>
        <div class="mt-6">
          <a id="leetcodeLink" class="inline-block rounded-lg bg-cyan-700 px-5 py-2.5 font-semibold text-white hover:bg-cyan-600" target="_blank" rel="noopener">
            Open on LeetCode &rarr;
          </a>
          <p class="mt-3 text-sm text-zinc-400">Solve the problem on LeetCode, then log your result below.</p>
        </div>
      </div>
      <div class="mt-6 flex gap-4">
        <button id="btnSolved" class="flex-1 rounded-lg bg-emerald-600 px-6 py-4 text-lg font-bold text-white hover:bg-emerald-500 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
          I Solved It &#10003;
        </button>
        <button id="btnUnsolved" class="flex-1 rounded-lg bg-red-700 px-6 py-4 text-lg font-bold text-white hover:bg-red-600 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
          I Couldn't Solve It &#10007;
        </button>
      </div>
      <div id="resultPanel" class="result-panel mt-6 rounded-lg border border-zinc-800 bg-zinc-900 p-6">
        <div class="grid gap-4 sm:grid-cols-3">
          <div>
            <p class="label">Pattern practiced</p>
            <p id="resultPattern" class="mt-1 font-semibold"></p>
          </div>
          <div>
            <p class="label">Elo change</p>
            <p id="resultElo" class="mt-1 font-semibold"></p>
          </div>
          <div>
            <p class="label">Next up</p>
            <p id="resultNextPattern" class="mt-1 font-semibold"></p>
          </div>
        </div>
        <div class="mt-4 flex flex-wrap items-center gap-2">
          <span id="resultReasonBadge" class="inline-block rounded-full border border-zinc-700 px-3 py-0.5 text-xs text-zinc-300"></span>
          <span id="resultNextDifficulty" class="inline-block rounded-full border border-zinc-700 px-3 py-0.5 text-xs text-zinc-300"></span>
        </div>
        <p id="resultExplanation" class="mt-4 text-sm text-zinc-300"></p>
        <div class="mt-5">
          <button id="btnNext" class="rounded-lg bg-cyan-700 px-5 py-2.5 font-semibold text-white hover:bg-cyan-600 transition-colors">
            Practice Next Problem &rarr;
          </button>
        </div>
      </div>
    </div>
    <p id="error" class="mt-4 min-h-6 text-sm text-red-300"></p>
  </main>
  <script>
    const token = localStorage.getItem('pf_token'), userId = localStorage.getItem('pf_user_id');
    if (!token || !userId) location.href = '/';

    const $ = id => document.getElementById(id);
    const showError = msg => $('error').textContent = msg || '';
    const authHeaders = {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'};

    async function api(path, options = {}) {
      const res = await fetch(path, {...options, headers: {...authHeaders, ...(options.headers || {})}});
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Request failed');
      return json.data;
    }

    const HUMAN_NAMES = {
      "hash_map_lookup": "Hash Map Lookup",
      "hash_map_frequency": "Hash Map Frequency",
      "prefix_sum": "Prefix Sum",
      "sliding_window_fixed": "Fixed Sliding Window",
      "sliding_window_variable": "Sliding Window",
      "two_pointers_opposite": "Two Pointers",
      "two_pointers_same": "Two Pointers (Same Direction)",
      "dfs_recursive": "Depth-First Search",
      "dfs_iterative": "Depth-First Search (Iterative)",
      "bfs_level_order": "Breadth-First Search",
      "bfs_shortest_path": "Breadth-First Search (Shortest Path)",
      "topological_sort": "Topological Sort",
      "union_find": "Union-Find",
      "binary_search_tree": "Binary Search Tree",
      "dp_1d_forward": "1D Dynamic Programming",
      "dp_1d_sequence": "1D Sequence DP",
      "dp_2d_grid": "2D Grid DP",
      "dp_2d_string": "2D String DP",
      "dp_knapsack": "Knapsack DP",
      "dp_interval": "Interval DP",
      "dp_state_machine": "State Machine DP",
      "fast_slow_pointers": "Fast & Slow Pointers",
      "linked_list_reversal": "Linked List Reversal",
      "monotonic_stack": "Monotonic Stack",
      "monotonic_deque": "Monotonic Deque",
      "binary_search_standard": "Binary Search",
      "binary_search_rotated": "Binary Search (Rotated)",
      "binary_search_answer": "Binary Search on Answer",
      "heap_top_k": "Heap / Top K",
      "greedy_local": "Greedy",
      "greedy_interval": "Greedy (Intervals)",
      "backtracking_permutation": "Backtracking (Permutations)",
      "backtracking_subset": "Backtracking (Subsets)",
    };
    const human = p => HUMAN_NAMES[p] || p.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

    const REASON_LABELS = {
      "specific": "Targeted problem",
      "topic_hint": "Topic guidance",
      "general_hint": "Fundamentals",
    };
    const reasonLabel = tier => REASON_LABELS[tier] || "Recommendation";

    let currentRec = null;

    function setRecommendation(rec) {
      currentRec = rec;
      $('problemTitle').textContent = rec.problem ? rec.problem.title : 'Pick a problem';
      $('difficulty').textContent = rec.difficulty;
      $('reasonBadge').textContent = reasonLabel(rec.tier || rec.confidence_tier);
      $('topicTags').textContent = rec.problem ? rec.problem.topics : '';
      $('explanation').textContent = rec.explanation;
      $('leetcodeLink').href = rec.problem ? rec.problem.link : rec.leetcode_url;
      $('loading').classList.add('hidden');
      $('practiceContent').classList.remove('hidden');
      $('btnSolved').disabled = false;
      $('btnUnsolved').disabled = false;
    }

    async function submit(verdict) {
      showError('');
      $('btnSolved').disabled = true;
      $('btnUnsolved').disabled = true;
      try {
        const data = await api('/api/submit', {method: 'POST', body: JSON.stringify({
          user_id: Number(userId),
          problem_id: currentRec.problem.id,
          verdict: verdict
        })});
        const rec = data.next_recommendation;
        $('resultPattern').textContent = human(data.pattern_updated);
        const sign = data.elo_change >= 0 ? '+' : '';
        $('resultElo').textContent = `${sign}${data.elo_change}`;
        $('resultNextPattern').textContent = human(rec.pattern);
        $('resultReasonBadge').textContent = reasonLabel(rec.tier || rec.confidence_tier);
        $('resultNextDifficulty').textContent = rec.difficulty;
        $('resultExplanation').textContent = data.explanation;
        $('resultPanel').classList.add('show');
      } catch (err) {
        showError(err.message);
        $('btnSolved').disabled = false;
        $('btnUnsolved').disabled = false;
      }
    }

    $('btnSolved').addEventListener('click', () => submit('solved'));
    $('btnUnsolved').addEventListener('click', () => submit('unsolved'));

    $('btnNext').addEventListener('click', () => {
      $('resultPanel').classList.remove('show');
      $('btnSolved').disabled = false;
      $('btnUnsolved').disabled = false;
      api(`/api/recommend/${userId}`).then(setRecommendation).catch(showError);
    });

    $('logout').addEventListener('click', () => { localStorage.clear(); location.href = '/'; });

    api(`/api/recommend/${userId}`)
      .then(setRecommendation)
      .catch(err => { $('loading').classList.add('hidden'); showError(err.message); });
  </script>
</body>
</html>
